name: Generate CV PDF

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
  workflow_dispatch: # Allow manual triggering

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # pnpm latest requires Node >= 22.13
          
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.27.0  # pinned: pnpm 11 (latest) errors on ignored build scripts

      - name: 📦 Install dependencies
        run: pnpm install  # puppeteer is already a devDependency; no extra add needed
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          
      - name: 🔧 Install system dependencies for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm1 libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libxss1 libasound2t64
          
      - name: 🌐 Install Chrome for Puppeteer
        run: |
          CHROME_PATH=$(npx puppeteer browsers install chrome | grep chrome@ | awk '{print $2}')
          echo "PUPPETEER_EXECUTABLE_PATH=$CHROME_PATH" >> $GITHUB_ENV
          echo "Chrome installed at: $CHROME_PATH"
          
      - name: 🏗️ Build React application
        run: |
          npx update-browserslist-db@latest
          pnpm run build
        
      - name: 📄 Generate PDF
        run: |
          echo "Build directory contents:"
          ls -la build/ || echo "Build directory not found"
          echo "Chrome executable location:"
          which google-chrome || which chromium-browser || echo "Chrome not found in PATH"
          echo "Running PDF generation..."
          node scripts/generate-pdf.js
        env:
          CI: 'true'
          
      - name: 📊 List generated files
        run: |
          echo "Generated PDF files:"
          ls -la pdfs/*.pdf || echo "No PDF files found in pdfs/"
          
      - name: 🏷️ Get version
        id: version
        run: |
          VERSION=$(node -e "
            const fs = require('fs');
            const content = fs.readFileSync('src/constants.js', 'utf8');
            const match = content.match(/CV_VERSION\s*=\s*[\"']([^\"']+)[\"']/);
            console.log(match ? match[1] : 'v1.0');
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 🚀 Update rolling cv-latest release
        # cv-latest always holds the current PDF (delete + recreate so no stale
        # versioned assets accumulate). This is what the site download button uses.
        run: |
          gh release delete cv-latest --cleanup-tag --yes || true
          gh release create cv-latest pdfs/Mert_Yasin_CV_*.pdf \
            --title "CV PDF (latest)" \
            --notes "Current CV PDF — version ${{ steps.version.outputs.version }}, commit ${{ github.sha }}."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Archive this version (cv-<version>, create if absent)
        # One permanent, clean-named release per CV_VERSION. Created the first
        # time a version is built; left untouched on later builds of that version.
        run: |
          TAG="cv-${{ steps.version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "$TAG already archived; skipping"
          else
            gh release create "$TAG" pdfs/Mert_Yasin_CV_*.pdf \
              --title "CV PDF ${{ steps.version.outputs.version }}" \
              --notes "Archived CV PDF for ${{ steps.version.outputs.version }} (commit ${{ github.sha }})."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Success notification
        run: |
          echo "🎉 PDF generation and release complete!"
          echo "🔗 Releases: ${{ github.server_url }}/${{ github.repository }}/releases"